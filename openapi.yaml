openapi: 3.1.0
info:
  title: Ant Portfolio BFF API
  version: 0.2.0
  description: |
    Browser-facing API contract for the Ant Portfolio web application.
    Responses are shaped around frontend pages and workflows rather than exposing
    database tables directly. The BFF owns authentication/session translation,
    authorization, validation, page aggregation, and response formatting.

    Operations marked `implemented` exist in the current application. Operations
    marked `planned` describe the intended backend contract.
servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://example.com
    description: Production placeholder
tags:
  - name: Page Content
    description: Aggregated content shaped for public website pages.
  - name: Commission Types
    description: Public commission products and their details.
  - name: Applications
    description: Dynamic commission forms, answers, and reference uploads.
  - name: Inquiries
    description: Pre-order conversations that are not attached to a commission yet.
  - name: Authentication
    description: Magic-link login, verification, and logout.
  - name: Account
    description: Authenticated customer profile.
  - name: Commissions
    description: Customer commission orders and history.
  - name: Messages
    description: Customer and admin commission conversations.
  - name: Admin
    description: Protected commission, product, and site-management operations.
  - name: Webhooks
    description: Requests from external services such as payment providers.

paths:
  /api/content/home:
    get:
      tags: [Page Content]
      operationId: getHomePageContent
      summary: Get all content required to render Home
      x-implementation-status: implemented
      responses:
        "200":
          description: Aggregated Home content returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeContentResponse"

  /api/content/portfolio:
    get:
      tags: [Page Content]
      operationId: getPortfolioOverviewContent
      summary: Get Portfolio overview content
      x-implementation-status: implemented
      responses:
        "200":
          description: Portfolio overview returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioOverviewResponse"

  /api/content/projects:
    get:
      tags: [Page Content]
      operationId: listProjects
      summary: List portfolio projects
      x-implementation-status: implemented
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum: [original_characters, fanart]
      responses:
        "200":
          description: Projects returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectCollectionResponse"

  /api/content/contact:
    get:
      tags: [Page Content]
      operationId: getContactPageContent
      summary: Get public contact methods and available hours
      x-implementation-status: implemented
      responses:
        "200":
          description: Contact content returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactContentResponse"

  /api/site-settings:
    get:
      tags: [Page Content]
      operationId: getPublicSiteSettings
      summary: Get public site and commission availability settings
      x-implementation-status: implemented
      responses:
        "200":
          description: Public settings returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsResponse"

  /api/commission-types:
    get:
      tags: [Commission Types]
      operationId: listCommissionTypes
      summary: List active commission types
      x-implementation-status: implemented
      responses:
        "200":
          description: Commission types returned successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/CommissionType"

  /api/commission-types/{slug}:
    parameters:
      - $ref: "#/components/parameters/CommissionTypeSlug"
    get:
      tags: [Commission Types]
      operationId: getCommissionType
      summary: Get one commission type
      x-implementation-status: implemented
      responses:
        "200":
          description: Commission type returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionTypeResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/commission-types/{slug}/application-form:
    parameters:
      - $ref: "#/components/parameters/CommissionTypeSlug"
    get:
      tags: [Applications]
      operationId: getCommissionApplicationForm
      summary: Get the dynamic questions configured for a commission type
      x-implementation-status: implemented
      responses:
        "200":
          description: Application-form definition returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationFormDefinitionResponse"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/commission-applications:
    post:
      tags: [Applications]
      operationId: submitCommissionApplication
      summary: Submit answers for a commission type
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionApplicationCreate"
      responses:
        "201":
          description: Application accepted and commission record created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/uploads/presign:
    post:
      tags: [Applications]
      operationId: createUploadUrl
      summary: Create a temporary upload URL for editor reference images
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadRequest"
      responses:
        "200":
          description: Temporary upload URL created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/inquiries:
    get:
      tags: [Inquiries]
      operationId: listMyInquiries
      summary: List the authenticated customer's pre-order inquiries
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Inquiries returned successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Inquiry"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Inquiries]
      operationId: createInquiry
      summary: Start a pre-order inquiry
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InquiryCreate"
      responses:
        "201":
          description: Inquiry created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InquiryResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/inquiries/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/InquiryId"
    get:
      tags: [Inquiries]
      operationId: listInquiryMessages
      summary: List messages for a customer-owned inquiry
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Inquiry messages returned successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Inquiries]
      operationId: createInquiryMessage
      summary: Send a message in a customer-owned inquiry
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageCreate"
      responses:
        "201":
          description: Message sent successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/auth/magic-link:
    post:
      tags: [Authentication]
      operationId: requestMagicLink
      summary: Send a magic-link login email
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MagicLinkRequest"
      responses:
        "202":
          description: The login email was accepted for delivery.
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    examples: [Authentication email sent]
                  debugToken:
                    type: string
                    description: Development-only token used until email delivery is connected.
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/RateLimited"

  /api/auth/verify:
    post:
      tags: [Authentication]
      operationId: verifyMagicLink
      summary: Verify a magic-link token and create a session
      x-implementation-status: implemented
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  minLength: 1
      responses:
        "200":
          description: Token verified. A secure session cookie is set.
          headers:
            Set-Cookie:
              schema:
                type: string
              description: Secure, HTTP-only session cookie.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/auth/logout:
    post:
      tags: [Authentication]
      operationId: logout
      summary: Destroy the current session
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Logged out successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"

  /api/account:
    get:
      tags: [Account]
      operationId: getAccount
      summary: Get the authenticated customer account
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Customer account returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
    patch:
      tags: [Account]
      operationId: updateAccount
      summary: Update the authenticated customer's name or email
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AccountUpdate"
      responses:
        "200":
          description: Customer account updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/commissions:
    get:
      tags: [Commissions]
      operationId: listMyCommissions
      summary: List the authenticated customer's commissions
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CommissionStatus"
      responses:
        "200":
          description: Commissions returned successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Commission"
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      tags: [Commissions]
      operationId: createCommission
      summary: Submit a commission order or inquiry
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionCreate"
      responses:
        "201":
          description: Commission request created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          description: Commissions are closed or the selected type is unavailable.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /api/commissions/{id}:
    parameters:
      - $ref: "#/components/parameters/CommissionId"
    get:
      tags: [Commissions]
      operationId: getMyCommission
      summary: Get one commission owned by the authenticated customer
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Commission returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/commissions/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/CommissionId"
    get:
      tags: [Messages]
      operationId: listCommissionMessages
      summary: List messages for a customer-owned commission
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Messages returned in chronological order.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Message"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Messages]
      operationId: createCommissionMessage
      summary: Send a message about a customer-owned commission
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                body:
                  type: string
                  minLength: 1
                  maxLength: 5000
      responses:
        "201":
          description: Message sent successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    $ref: "#/components/schemas/Message"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/settings:
    get:
      tags: [Admin]
      operationId: getAdminSettings
      summary: Get editable site settings
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Settings returned successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    patch:
      tags: [Admin]
      operationId: updateAdminSettings
      summary: Update commission availability and contact settings
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SiteSettingsUpdate"
      responses:
        "200":
          description: Settings updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SiteSettingsResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/commission-types:
    post:
      tags: [Admin]
      operationId: createCommissionType
      summary: Create a commission type
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionTypeWrite"
      responses:
        "201":
          description: Commission type created successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionTypeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /api/admin/commission-types/{id}:
    parameters:
      - $ref: "#/components/parameters/CommissionTypeId"
    patch:
      tags: [Admin]
      operationId: updateCommissionType
      summary: Update, activate, hide, or reorder a commission type
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionTypeWrite"
      responses:
        "200":
          description: Commission type updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionTypeResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Admin]
      operationId: deleteCommissionType
      summary: Delete a commission type
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      responses:
        "204":
          description: Commission type deleted successfully.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/admin/commissions:
    get:
      tags: [Admin]
      operationId: listAdminCommissions
      summary: List commissions across all customers
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CommissionStatus"
      responses:
        "200":
          description: Commissions returned successfully.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/Commission"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /api/admin/commissions/{id}:
    parameters:
      - $ref: "#/components/parameters/CommissionId"
    patch:
      tags: [Admin]
      operationId: updateAdminCommission
      summary: Update status, quote, invoice, or commission metadata
      x-implementation-status: implemented
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CommissionAdminUpdate"
      responses:
        "200":
          description: Commission updated successfully.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CommissionResponse"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/webhooks/stripe:
    post:
      tags: [Webhooks]
      operationId: processStripeWebhook
      summary: Process Stripe invoice and payment events
      x-implementation-status: implemented
      parameters:
        - name: stripe-signature
          in: header
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        "200":
          description: Event processed or safely ignored.
        "400":
          description: Invalid payload or signature.

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: ant_session

  parameters:
    CommissionTypeSlug:
      name: slug
      in: path
      required: true
      schema:
        type: string
        examples: [illustration]
    CommissionTypeId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CommissionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    InquiryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    BadRequest:
      description: Request validation failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Authentication is required or the session has expired.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: The authenticated user cannot access this resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: The requested resource was not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: The request conflicts with an existing resource.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    RateLimited:
      description: Too many requests were sent in a short period.
      headers:
        Retry-After:
          schema:
            type: integer
          description: Seconds until another request should be attempted.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    MediaAsset:
      type: object
      required: [id, url, alt]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        alt:
          type: string
        width:
          type: integer
          minimum: 1
        height:
          type: integer
          minimum: 1

    ContentSection:
      type: object
      required: [key, title, body, media]
      properties:
        key:
          type: string
        title:
          type: string
        body:
          type: string
        media:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        href:
          type: string

    HomeContent:
      type: object
      required: [hero, instagram, artisticWorld, commissions]
      properties:
        hero:
          $ref: "#/components/schemas/ContentSection"
        instagram:
          $ref: "#/components/schemas/ContentSection"
        fanMoments:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        artisticWorld:
          $ref: "#/components/schemas/ContentSection"
        commissions:
          $ref: "#/components/schemas/ContentSection"

    HomeContentResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/HomeContent"

    PortfolioOverview:
      type: object
      required:
        - introduction
        - featuredWorks
        - artisticViewpoint
        - workflow
        - traditionalArt
        - projectPreviews
      properties:
        introduction:
          type: string
        featuredWorks:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"
        artisticViewpoint:
          $ref: "#/components/schemas/ContentSection"
        workflow:
          type: array
          items:
            $ref: "#/components/schemas/ContentSection"
        traditionalArt:
          $ref: "#/components/schemas/ContentSection"
        projectPreviews:
          type: array
          items:
            $ref: "#/components/schemas/Project"

    PortfolioOverviewResponse:
      type: object
      required: [data]
      properties:
        data:
          $ref: "#/components/schemas/PortfolioOverview"

    Project:
      type: object
      required: [id, slug, title, category, description, media]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
        title:
          type: string
        category:
          type: string
          enum: [original_characters, fanart]
        description:
          type: string
        media:
          type: array
          items:
            $ref: "#/components/schemas/MediaAsset"

    ProjectCollectionResponse:
      type: object
      required: [data]
      properties:
        data:
